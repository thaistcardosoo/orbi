kind = "web"
previewPath = "/"
title = "Orbi"
version = "1.0.0"
id = "artifacts/orbi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24332

[services.development]
run = "pnpm --filter @workspace/orbi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orbi", "run", "build" ]
publicDir = "artifacts/orbi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24332"
BASE_PATH = "/"
