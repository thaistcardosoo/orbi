openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Orbi API - Brazilian job platform for startups and tech companies
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: companies
    description: Company operations
  - name: jobs
    description: Job listing operations
  - name: articles
    description: Article/media operations
  - name: categories
    description: Category operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List companies
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: size
          in: query
          schema:
            type: string
            enum: [startup, pequena, media, grande]
        - name: featured
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyListResponse"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Company not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: modality
          in: query
          schema:
            type: string
            enum: [presencial, remoto, hibrido]
        - name: contractType
          in: query
          schema:
            type: string
            enum: [clt, pj, estagio, freelancer]
        - name: level
          in: query
          schema:
            type: string
            enum: [junior, pleno, senior, especialista]
        - name: companyId
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List articles
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleListResponse"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get an article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Article not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List company categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"

  /stats:
    get:
      operationId: getStats
      tags: [health]
      summary: Platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    FaqItem:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
      required:
        - question
        - answer

    Company:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        logo:
          type: string
        coverImage:
          type: string
        tagline:
          type: string
        description:
          type: string
        category:
          type: string
        size:
          type: string
          enum: [startup, pequena, media, grande]
        foundedYear:
          type: integer
        employeeCount:
          type: integer
        averageAge:
          type: integer
        genderRatio:
          type: string
          nullable: true
        videoUrl:
          type: string
          nullable: true
        city:
          type: string
        state:
          type: string
        website:
          type: string
        linkedin:
          type: string
        instagram:
          type: string
        featured:
          type: boolean
        benefits:
          type: array
          items:
            type: string
        values:
          type: array
          items:
            type: string
        photos:
          type: array
          items:
            type: string
        jobCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - tagline
        - description
        - category
        - size
        - city
        - state
        - featured
        - benefits
        - values
        - photos
        - jobCount

    CompanyListResponse:
      type: object
      properties:
        companies:
          type: array
          items:
            $ref: "#/components/schemas/Company"
        total:
          type: integer
      required:
        - companies
        - total

    Job:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        companyId:
          type: integer
        companyName:
          type: string
        companyLogo:
          type: string
        category:
          type: string
        description:
          type: string
        requirements:
          type: array
          items:
            type: string
        benefits:
          type: array
          items:
            type: string
        faq:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/FaqItem"
        city:
          type: string
        state:
          type: string
        modality:
          type: string
          enum: [presencial, remoto, hibrido]
        contractType:
          type: string
          enum: [clt, pj, estagio, freelancer]
        level:
          type: string
          enum: [junior, pleno, senior, especialista]
        salaryMin:
          type: integer
          nullable: true
        salaryMax:
          type: integer
          nullable: true
        featured:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - slug
        - companyId
        - companyName
        - category
        - description
        - requirements
        - benefits
        - city
        - state
        - modality
        - contractType
        - level
        - featured
        - createdAt

    JobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        total:
          type: integer
      required:
        - jobs
        - total

    Article:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        coverImage:
          type: string
        category:
          type: string
        author:
          type: string
        authorAvatar:
          type: string
        readTime:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - slug
        - excerpt
        - content
        - category
        - author
        - readTime
        - createdAt

    ArticleListResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
        total:
          type: integer
      required:
        - articles
        - total

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        companyCount:
          type: integer
      required:
        - id
        - name
        - slug
        - companyCount

    CategoryListResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
      required:
        - categories

    PlatformStats:
      type: object
      properties:
        totalJobs:
          type: integer
        totalCompanies:
          type: integer
        totalCandidates:
          type: integer
        totalCities:
          type: integer
      required:
        - totalJobs
        - totalCompanies
        - totalCandidates
        - totalCities
